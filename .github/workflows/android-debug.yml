name: Android 001 Debug Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK 36
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Gradle 9.4.1
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.4.1"
          cache-disabled: true

      - name: Unit tests and debug APK
        run: gradle --no-daemon testDebugUnitTest assembleDebug

      - name: Name APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/SG-CLIENT-ANDROID-001-debug.apk

      - name: Upload test APK
        uses: actions/upload-artifact@v4
        with:
          name: SG-CLIENT-ANDROID-001
          path: app/build/outputs/apk/debug/SG-CLIENT-ANDROID-001-debug.apk
          if-no-files-found: error
          retention-days: 14
