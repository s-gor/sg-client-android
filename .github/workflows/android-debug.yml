name: Android 001 Debug Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK command-line tools
        uses: android-actions/setup-android@v3

      - name: Android SDK 36
        shell: bash
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Gradle 9.4.1
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.4.1"
          cache-disabled: true

      - name: Unit tests and debug APK
        run: gradle --no-daemon testDebugUnitTest assembleDebug --stacktrace

      - name: Name APK
        shell: bash
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk              app/build/outputs/apk/debug/001-SG-CLIENT-ANDROID-debug.apk

      - name: Upload test APK
        uses: actions/upload-artifact@v7
        with:
          name: 001-SG-CLIENT-ANDROID
          path: app/build/outputs/apk/debug/001-SG-CLIENT-ANDROID-debug.apk
          if-no-files-found: error
          retention-days: 14
